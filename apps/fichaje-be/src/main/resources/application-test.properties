spring.datasource.url=jdbc:mysql://localhost:3308/db_fichajespi_test?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Madrid
spring.datasource.username=test_user
spring.datasource.password=test_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Mail (mock)
spring.mail.host=localhost
spring.mail.port=1025

# JWT
jwt.secret=${JWT_SECRET:test-secret-key}
jwt.expiration=${JWT_EXPIRATION:3600}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Rate limiting (disabled in tests)
rate-limit.enabled=${RATE_LIMIT_ENABLED:false}

# Logging
logging.level.com.fichajespi=INFO