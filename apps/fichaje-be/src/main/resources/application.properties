#CrossOrigins - Override in environment-specific files
client.url=${CLIENT_URL:http://localhost:4200}

#Change default server port
server.port=8080

#prevent the application from stop if database is down
spring.sql.init.continue-on-error=true

#Security settings
server.ssl.enabled=${SSL_ENABLED:false}
server.ssl.key-store=${SSL_KEYSTORE_PATH}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
server.ssl.key-store-type=PKCS12

#DATABASE_____________________________________________
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/db_fichajespi_dev?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Madrid}
spring.datasource.username=${DB_USERNAME:fichajes_dev}
spring.datasource.password=${DB_PASSWORD:fichajes_dev}
spring.datasource.driver-class-name =com.mysql.cj.jdbc.Driver

# mostrar sentencias SQL en la consola
spring.jpa.show-sql = false

# hibernate genera SQL optimizado
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL5Dialect


#EMAIL_________________________________________________
spring.mail.host=${MAIL_HOST:smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

# Other properties
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# security - JWT
jwt.secret=${JWT_SECRET:very-secure-secret}
jwt.expiration=${JWT_EXPIRATION:36000000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Rate limiting
rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
rate-limit.requests=100
rate-limit.duration-minutes=1

