# ============================================================================
# PRODUCTION CONFIGURATION - Use environment variables for secrets
# ============================================================================

# Active profile
spring.profiles.active=prod

# CrossOrigins - MUST be set via environment variable for security
client.url=${CLIENT_URL:https://yourdomain.com}

# Change default server port
server.port=8443

# SSL/TLS Configuration - REQUIRED FOR PRODUCTION
server.ssl.enabled=true
server.ssl.key-store=${SSL_KEYSTORE_PATH}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=${SSL_KEY_ALIAS:tomcat}

# HTTP to HTTPS redirect
server.http2.enabled=true
server.compression.enabled=true
server.compression.min-response-size=1024

# Prevent application from stopping if database is down
spring.sql.init.continue-on-error=false

# DATABASE - Connection pooling for production
spring.jpa.hibernate.ddl-auto=validate
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# JPA/Hibernate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5Dialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# EMAIL - MUST use environment variables
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.socketFactory.port=587
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.socketFactory.fallback=false

# Security - JWT (MUST be generated securely and set via environment variable)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:36000000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Rate limiting
rate-limit.enabled=true
rate-limit.requests=100
rate-limit.duration-minutes=1

# Logging
logging.level.root=WARN
logging.level.org.fichaje=INFO
logging.file.name=/var/log/fichaje/application.log
logging.file.max-size=10MB
logging.file.max-history=30

# Security headers
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
