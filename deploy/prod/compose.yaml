# Compose para PRODUCCIÓN (usa imágenes ya construidas)
# Uso:
#  - docker compose -f deploy/prod/compose.yaml --env-file deploy/prod/.env up -d
#  - docker compose -f deploy/prod/compose.yaml --env-file deploy/prod/.env down

services:
  db:
    container_name: fichaje_db
    image: mysql:8.0
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ:-Europe/Madrid}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - fichajes-network

  backend:
    container_name: fichaje_be
    image: ${BACKEND_IMAGE:-ghcr.io/jamataran/fichaje-backend:latest}
    environment:
      TZ: ${TZ:-Europe/Madrid}
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Madrid
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      CLIENT_URL: ${CLIENT_URL}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE}
      JWT_SECRET: ${JWT_SECRET}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/test || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fichajes-network

  frontend:
    container_name: fichaje_fe
    image: ${FRONTEND_IMAGE:-ghcr.io/jamataran/fichaje-frontend:latest}
    expose:
      - "80"
    environment:
      TZ: ${TZ:-Europe/Madrid}
    restart: unless-stopped
    networks:
      - fichajes-network

  proxy:
    container_name: fichaje_proxy
    image: caddy:2-alpine
    ports:
      - "${APP_PORT:-80}:80"
      - "${APP_SSL_PORT:-443}:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fichajes-network

  phpmyadmin:
    container_name: fichaje_dbadmin
    build:
      context: .
      dockerfile: Dockerfile.phpmyadmin
    expose:
      - "80"
    environment:
      PMA_ARBITRARY: 0
      PMA_HOST: db
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./.htpasswd:/etc/apache2/.htpasswd:ro
      - ./apache-auth.conf:/tmp/apache-auth.conf:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fichajes-network

networks:
  fichajes-network:
    name: fichajes-prod-network

volumes:
  db_data:
    name: fichajes_db_prod_data
  caddy_data:
    name: fichajes_caddy_data
  caddy_config:
    name: fichajes_caddy_config
  caddy_logs:
    name: fichajes_caddy_logs
