# Fichaje Nginx Configuration - Production
# Ubicación: /etc/nginx/sites-available/fichajes.biedma.com

# Redirect HTTP → HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name fichajes.biedma.com *.fichajes.biedma.com;
    
    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect todos HTTP requests a HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    
    server_name fichajes.biedma.com;
    
    # ================== SSL CONFIGURATION ==================
    
    # Certificados SSL (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/fichajes.biedma.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fichajes.biedma.com/privkey.pem;
    
    # Protocolos SSL seguros (TLS 1.2+)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    
    # Session management
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/fichajes.biedma.com/chain.pem;
    
    # ================== SECURITY HEADERS ==================
    
    # HSTS - Force HTTPS for 1 year
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # Enable XSS protection
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Referrer Policy
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://api.biedma.com; frame-ancestors 'none';" always;
    
    # Permissions Policy
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), accelerometer=(), gyroscope=(), magnetometer=(), usb=()" always;
    
    # ================== PERFORMANCE ==================
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/javascript application/json;
    
    # Buffer sizes
    client_max_body_size 100M;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    
    # Timeouts
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    
    # ================== LOGGING ==================
    
    access_log /var/log/nginx/fichajes.biedma.com.access.log combined buffer=32k;
    error_log /var/log/nginx/fichajes.biedma.com.error.log warn;
    
    # ================== BACKEND API (Puerto 8443) ==================
    
    location /api/ {
        # Proxy settings
        proxy_pass https://localhost:8443/;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header Connection "";
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts para operaciones largas
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }
    
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=fichaje_api:10m rate=100r/m;
    
    location /api/auth/login {
        limit_req zone=fichaje_api burst=10 nodelay;
        proxy_pass https://localhost:8443;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # ================== FRONTEND (Angular) ==================
    
    # Archivos estáticos con cache agresivo
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /var/www/fichaje-fe;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Index routing para Angular
    location / {
        root /var/www/fichaje-fe;
        try_files $uri $uri/ /index.html;
        
        # No cachear index.html
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
    
    # ================== HEALTH CHECK ==================
    
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # ================== DENY SENSITIVE PATHS ==================
    
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # ================== MONITORING ==================
    
    # Prometheus metrics (protegida por rate limit)
    location /nginx-metrics {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }
}

# Redirect www to non-www (opcional)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    server_name www.fichajes.biedma.com;
    
    ssl_certificate /etc/letsencrypt/live/fichajes.biedma.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fichajes.biedma.com/privkey.pem;
    
    return 301 https://fichajes.biedma.com$request_uri;
}
